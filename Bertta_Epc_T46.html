<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beretta EPC — Electronic Parts Catalog</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg0: #0d0f11;
      --bg1: #13171a;
      --bg2: #1a1f24;
      --bg3: #22282e;
      --bg4: #2c333b;
      --border: #2e3740;
      --border2: #3d4755;
      --text0: #e8edf2;
      --text1: #a8b4c0;
      --text2: #6b7a88;
      --amber: #f59e0b;
      --amber2: #d97706;
      --amber3: #92400e;
      --amberBg: #1c1408;
      --blue: #3b82f6;
      --blueBg: #0c1829;
      --blue3: #1d4ed8;
      --green: #10b981;
      --greenBg: #041810;
      --red: #ef4444;
      --font-ui: 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'Consolas', 'Courier New', monospace;
    }

    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: var(--font-ui);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    body.resizing {
      user-select: none;
      cursor: ns-resize
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg1);
      border-bottom: 2px solid var(--amber3);
      padding: 0 16px;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      z-index: 100
    }

    .logo-box {
      background: var(--amber);
      color: #000;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 2px;
      padding: 5px 11px;
      border-radius: 4px
    }

    .logo-sub {
      color: var(--text2);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase
    }

    .divider {
      width: 1px;
      height: 22px;
      background: var(--border2);
      flex-shrink: 0
    }

    .topbar select {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text0);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      outline: none;
      cursor: pointer
    }

    .topbar select:focus {
      border-color: var(--amber)
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase
    }

    .tag-amber {
      background: var(--amberBg);
      color: var(--amber);
      border: 1px solid var(--amber3)
    }

    .tag-blue {
      background: var(--blueBg);
      color: var(--blue);
      border: 1px solid var(--blue3)
    }

    .ml-auto {
      margin-left: auto
    }

    .sn-label {
      color: var(--text2);
      font-size: 10px;
      line-height: 1
    }

    .sn-value {
      color: var(--amber);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3
    }

    /* ── LAYOUT ── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 268px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0
    }

    .sidebar-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase
    }

    .sidebar-scroll {
      overflow-y: auto;
      flex: 1
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .model-group {
      border-bottom: 1px solid var(--border)
    }

    .model-header {
      padding: 7px 12px;
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      border-left: 3px solid transparent
    }

    .model-header:hover {
      background: var(--bg3)
    }

    .grp-chevron {
      font-size: 9px;
      color: var(--text2);
      transition: transform .15s;
      margin-left: auto;
      flex-shrink: 0
    }

    .grp-chevron.open {
      transform: rotate(90deg)
    }

    .tree-item {
      display: flex;
      align-items: center;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .1s
    }

    .tree-item:hover {
      background: var(--bg3)
    }

    .tree-item.active {
      background: var(--amberBg);
      border-left-color: var(--amber)
    }

    .tree-item.active .ti-label {
      color: var(--amber)
    }

    .tree-item.active .ti-code {
      color: var(--amber2)
    }

    .ti-body {
      padding: 5px 12px 5px 14px;
      flex: 1;
      min-width: 0
    }

    .ti-label {
      font-size: 12px;
      color: var(--text1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3
    }

    .ti-code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text2);
      margin-top: 1px
    }

    .ti-right {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-right: 8px;
      flex-shrink: 0
    }

    .ti-badge {
      font-size: 10px;
      color: var(--text2);
      background: var(--bg4);
      border-radius: 8px;
      padding: 1px 6px
    }

    .ti-hsdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .asm-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      flex-shrink: 0
    }

    .asm-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .asm-id {
      font-family: var(--font-mono);
      font-size: 19px;
      font-weight: 700;
      color: var(--amber)
    }

    .asm-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text0)
    }

    .asm-meta {
      display: flex;
      gap: 16px;
      margin-top: 5px;
      flex-wrap: wrap
    }

    .asm-meta-i {
      font-size: 11px;
      color: var(--text2)
    }

    .asm-meta-i span {
      color: var(--text1)
    }

    /* ── DIAGRAM TOOLBAR ── */
    .diag-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 38px
    }

    .btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      padding: 3px 11px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-ui);
      white-space: nowrap;
      transition: background .1s, color .1s, border-color .1s
    }

    .btn:hover {
      background: var(--bg4);
      color: var(--text0);
      border-color: var(--text2)
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed
    }

    .btn.on {
      background: var(--amberBg);
      border-color: var(--amber3);
      color: var(--amber)
    }

    .btn.on:hover {
      background: #261a06
    }

    .btn-edit {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 3px 11px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-ui);
      white-space: nowrap;
      transition: all .1s
    }

    .btn-edit:hover {
      border-color: var(--amber);
      color: var(--amber)
    }

    .btn-edit.on {
      background: var(--amberBg);
      border-color: var(--amber3);
      color: var(--amber)
    }

    .zoom-ctrl {
      display: flex;
      align-items: center;
      gap: 3px
    }

    .zoom-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      width: 24px;
      height: 24px;
      border-radius: 3px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s;
      user-select: none;
      line-height: 1
    }

    .zoom-btn:hover {
      background: var(--bg4);
      color: var(--text0)
    }

    .zoom-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed
    }

    .zoom-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text1);
      min-width: 38px;
      text-align: center
    }

    .d-sep {
      width: 1px;
      height: 18px;
      background: var(--border2);
      flex-shrink: 0;
      margin: 0 2px
    }

    /* ── DIAGRAM AREA ── */
    .diag-scroll {
      flex: 1;
      overflow: auto;
      background: #0a0c0e;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start
    }

    .diag-scroll::-webkit-scrollbar {
      width: 7px;
      height: 7px
    }

    .diag-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    .diag-empty {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text2)
    }

    .diag-empty-icon {
      font-size: 44px;
      opacity: .12
    }

    .diag-empty-title {
      font-size: 13px;
      color: var(--text1);
      font-weight: 500
    }

    .diag-tip {
      margin-top: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      max-width: 420px;
      font-size: 11px;
      line-height: 1.75;
      color: var(--text2)
    }

    .diag-tip strong {
      color: var(--amber)
    }

    /* ── EDIT MODE BANNER ── */
    .edit-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 14px;
      background: var(--amberBg);
      border-bottom: 1px solid var(--amber3);
      flex-shrink: 0;
      font-size: 11px;
      color: var(--amber)
    }

    .edit-banner strong {
      color: var(--amber)
    }

    .edit-hint-sel {
      color: var(--text1)
    }

    /* ── RESIZE HANDLE ── */
    .resize-h {
      height: 6px;
      background: var(--bg1);
      border-top: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      cursor: ns-resize;
      flex-shrink: 0;
      position: relative;
      transition: background .15s
    }

    .resize-h:hover,
    .resize-h.active {
      background: #1e1a0f
    }

    .resize-h::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 2px;
      background: var(--border2);
      border-radius: 2px;
      pointer-events: none
    }

    /* ── SEARCH BAR ── */
    .search-bar {
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg1);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .search-bar input {
      flex: 1;
      max-width: 380px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text0);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
      font-family: var(--font-ui)
    }

    .search-bar input:focus {
      border-color: var(--amber)
    }

    .search-bar input::placeholder {
      color: var(--text2)
    }

    .sel-chip {
      background: var(--blueBg);
      color: var(--blue);
      border: 1px solid var(--blue3);
      border-radius: 10px;
      padding: 2px 9px;
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: background .1s;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .sel-chip:hover {
      background: #0f1f3d
    }

    .res-count {
      font-size: 10px;
      color: var(--text2);
      cursor: pointer
    }

    .res-count:hover {
      color: var(--text0)
    }

    /* ── TABLE ── */
    .table-wrap {
      flex: 1;
      overflow: auto
    }

    .table-wrap::-webkit-scrollbar {
      width: 7px;
      height: 7px
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    .parts-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    .parts-table thead {
      position: sticky;
      top: 0;
      z-index: 10
    }

    .parts-table th {
      background: var(--bg2);
      color: var(--text2);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border2);
      text-align: left;
      white-space: nowrap;
      user-select: none
    }

    .th-c {
      text-align: center
    }

    .parts-table td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      transition: background .08s
    }

    .parts-table tr {
      cursor: pointer
    }

    .parts-table tr:hover td {
      background: var(--bg2)
    }

    .tr-sel td {
      background: #0c1829 !important;
      border-left: 2px solid var(--blue)
    }

    .tr-sel:hover td {
      background: #0f1f3d !important
    }

    .tr-special td {
      border-left: 2px solid var(--green)
    }

    .td-item {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text2);
      font-weight: 700;
      white-space: nowrap
    }

    .hs-mini-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--amber);
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle
    }

    .td-code {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--blue)
    }

    .td-it {
      color: var(--text0);
      font-size: 12px;
      line-height: 1.4
    }

    .td-en {
      color: var(--text2);
      font-size: 11px;
      font-style: italic;
      margin-top: 1px;
      line-height: 1.3
    }

    .td-qty {
      text-align: center;
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--text0)
    }

    .td-pn {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--amber)
    }

    .td-pn.spec {
      color: var(--green)
    }

    /* ── HOTSPOT MARKERS ── */
    @keyframes pulse-ring {
      0% {
        box-shadow: 0 0 0 0 rgba(245, 158, 11, .7), 0 2px 8px rgba(0, 0, 0, .8)
      }

      70% {
        box-shadow: 0 0 0 9px rgba(245, 158, 11, 0), 0 2px 8px rgba(0, 0, 0, .8)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0), 0 2px 8px rgba(0, 0, 0, .8)
      }
    }

    @keyframes pulse-green {
      0% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, .8), 0 2px 8px rgba(0, 0, 0, .8)
      }

      70% {
        box-shadow: 0 0 0 10px rgba(16, 185, 129, 0), 0 2px 8px rgba(0, 0, 0, .8)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0), 0 2px 8px rgba(0, 0, 0, .8)
      }
    }

    .hs-dot {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--amber);
      color: #000;
      font-size: 9px;
      font-weight: 800;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2.5px solid rgba(0, 0, 0, .45);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .8);
      cursor: pointer;
      transition: transform .15s, background .15s;
      user-select: none;
      line-height: 1;
      animation: pulse-ring 2.5s ease-out infinite;
    }

    .hs-dot:hover {
      transform: translate(-50%, -50%) scale(1.25) !important;
      z-index: 30 !important
    }

    .hs-dot.hs-sel {
      background: var(--green);
      border-color: rgba(16, 185, 129, .3);
      animation: pulse-green 1.4s ease-out infinite;
      transform: translate(-50%, -50%) scale(1.35) !important;
      z-index: 25 !important;
    }

    .hs-dot.hs-edit:hover {
      background: var(--red)
    }

    /* ── RICH TOOLTIP ── */
    .hs-tooltip {
      position: fixed;
      z-index: 9999;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 10px 14px;
      min-width: 220px;
      max-width: 300px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .7);
      pointer-events: none;
      font-size: 12px;
    }

    .tt-item {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .tt-item-num {
      background: var(--amber);
      color: #000;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      flex-shrink: 0
    }

    .tt-it {
      font-size: 13px;
      font-weight: 600;
      color: var(--text0);
      margin-bottom: 2px;
      line-height: 1.3
    }

    .tt-en {
      font-size: 11px;
      color: var(--text2);
      font-style: italic;
      margin-bottom: 7px;
      line-height: 1.3
    }

    .tt-sep {
      height: 1px;
      background: var(--border);
      margin: 6px 0
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-bottom: 3px
    }

    .tt-lbl {
      color: var(--text2)
    }

    .tt-val {
      font-family: var(--font-mono);
      color: var(--amber);
      font-size: 11px
    }

    .tt-val.spec {
      color: var(--green)
    }

    .tt-footer {
      font-size: 10px;
      color: var(--text2);
      margin-top: 6px;
      font-style: italic
    }

    /* ── WELCOME ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text2)
    }

    .welcome-title {
      font-size: 16px;
      color: var(--text1);
      font-weight: 600
    }

    .welcome-sub {
      font-size: 12px;
      text-align: center;
      max-width: 340px;
      line-height: 1.6
    }

    .welcome-stats {
      display: flex;
      gap: 20px;
      margin-top: 8px
    }

    .stat-box {
      text-align: center;
      padding: 12px 22px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px
    }

    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--amber);
      font-family: var(--font-mono)
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px
    }

    /* ── STATUS BAR ── */
    .statusbar {
      background: var(--bg1);
      border-top: 1px solid var(--border);
      padding: 3px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 10px;
      color: var(--text2);
      flex-shrink: 0
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0
    }

    mark {
      background: var(--amber3);
      color: var(--amber);
      border-radius: 2px;
      padding: 0 2px

    function HL({ t, q }) {
      if (!q || !t) return t;
      const i = t.toLowerCase().indexOf(q.toLowerCase());
      if (i < 0) return t;
      return React.createElement('span', null, t.slice(0, i), React.createElement('mark', null, t.slice(i, i + q.length)), t.slice(i + q.length));
    }

    function loadHS() { try { return JSON.parse(localStorage.getItem('brt_hs3') || '{}'); } catch { return {}; } }
    function saveHS(hs) { try { localStorage.setItem('brt_hs3', JSON.stringify(hs)); } catch { } }
    function loadImg(id) { try { return localStorage.getItem('brt_img_' + id) || null; } catch { return null; } }
    function saveImg(id, data) { try { localStorage.setItem('brt_img_' + id, data); return true; } catch { return false; } }
    function delImg(id) { try { localStorage.removeItem('brt_img_' + id); } catch { } }

    // ─────────────────────────────────────────────────────────────────
    // RICH TOOLTIP (fixed-position, follows mouse)
    // ─────────────────────────────────────────────────────────────────
    function Tooltip({ part, mouseX, mouseY }) {
      if (!part) return null;
      const vw = window.innerWidth, vh = window.innerHeight;
      const W = 300, H = 170;
      let left = mouseX + 16, top = mouseY - 10;
      if (left + W > vw) left = mouseX - W - 12;
      if (top + H > vh) top = vh - H - 8;
      if (top < 4) top = 4;
      return h('div', { className: 'hs-tooltip', style: { left, top } },
        h('div', { className: 'tt-item' },
          h('div', { className: 'tt-item-num' }, part.n),
          h('span', { style: { color: 'var(--text2)', fontSize: '10px', fontFamily: 'var(--font-mono)' } }, part.c || '—')
        ),
        h('div', { className: 'tt-it' }, part.it),
        h('div', { className: 'tt-en' }, part.en),
        h('div', { className: 'tt-sep' }),
        h('div', { className: 'tt-row' }, h('span', { className: 'tt-lbl' }, 'Part No.'), h('span', { className: 'tt-val' + (part.sp ? ' spec' : '') }, part.pn)),
        h('div', { className: 'tt-row' }, h('span', { className: 'tt-lbl' }, 'Quantity'), h('span', { className: 'tt-val' }, part.q + ' EA')),
        h('div', { className: 'tt-footer' }, 'Click to highlight row in BOM ↓')
      );
    }

    // ─────────────────────────────────────────────────────────────────

    if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function DiagramPanel({ asmId, parts, hs, onHsChange, selPart, onPartSel, height, editMode }) {
      const [img, setImg] = useState(() => loadImg(asmId));
      const [natW, setNatW] = useState(1000);
      const [natH, setNatH] = useState(750);
      const [zoom, setZoom] = useState(1);
      const [pdfDoc, setPdfDoc] = useState(null);
      const [pdfPage, setPdfPage] = useState(1);
      const [pdfTotal, setPdfTotal] = useState(0);
      const [loading, setLoading] = useState(false);
      const [tooltip, setTooltip] = useState(null);// {part, x, y}
      const scrollRef = useRef(null);
      const canvasRef = useRef(null);
      const fileRef = useRef(null);
      const importRef = useRef(null);
      const asmHS = hs[asmId] || [];

      useEffect(() => {
        const saved = loadImg(asmId);
        setImg(saved);
        if (saved) { const t = new Image(); t.onload = () => { setNatW(t.naturalWidth); setNatH(t.naturalHeight); }; t.src = saved; }
        setPdfDoc(null); setPdfPage(1); setPdfTotal(0); setZoom(1);
      }, [asmId]);

      // Auto-pan: when selPart changes and has a hotspot, scroll diagram to center it
      useEffect(() => {
        if (selPart === null || !scrollRef.current) return;
        const dot = asmHS.find(d => d.item === selPart);
        if (!dot) return;
        const el = scrollRef.current;
        const dW = natW * zoom, dH = natH * zoom;
        const cx = dot.nx * dW, cy = dot.ny * dH;
        const vpW = el.clientWidth, vpH = el.clientHeight;
        el.scrollTo({ left: cx - vpW / 2 + 8, top: cy - vpH / 2 + 8, behavior: 'smooth' });
      }, [selPart, asmHS, natW, natH, zoom]);

      async function handleFile(ev) {
        const f = ev.target.files[0]; if (!f) return;
        setLoading(true);
        if (f.type.startsWith('image/')) {
          const r = new FileReader();
          r.onload = re => {
            const src = re.target.result;
            const ok = saveImg(asmId, src);
            if (!ok) alert('Image saved in memory only (too large for browser storage).');
            const t = new Image(); t.onload = () => { setNatW(t.naturalWidth); setNatH(t.naturalHeight); setImg(src); setLoading(false); }; t.src = src;
          };
          r.readAsDataURL(f);
        } else if (f.type === 'application/pdf' && window.pdfjsLib) {
          const buf = await f.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
          setPdfDoc(pdf); setPdfTotal(pdf.numPages); setPdfPage(1);
          await renderPdfPage(pdf, 1);
          setLoading(false);
        } else { setLoading(false); alert('Supported: PNG, JPG, PDF'); }
        ev.target.value = '';
      }

      async function renderPdfPage(pdf, page) {
        if (!canvasRef.current) return;
        const p = await pdf.getPage(page);
        const vp = p.getViewport({ scale: 2.0 });
        const cv = canvasRef.current; cv.width = vp.width; cv.height = vp.height;
        const ctx = cv.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cv.width, cv.height);
        await p.render({ canvasContext: ctx, viewport: vp }).promise;
        const src = cv.toDataURL('image/jpeg', 0.9);
        saveImg(asmId, src); setImg(src); setNatW(vp.width); setNatH(vp.height);
      }

      async function navPdf(dir) {
        if (!pdfDoc) return;
        const next = Math.max(1, Math.min(pdfTotal, pdfPage + dir));
        if (next === pdfPage) return;
        setPdfPage(next); setLoading(true);
        await renderPdfPage(pdfDoc, next); setLoading(false);
      }

      function handleDiagClick(ev) {
        if (!editMode || !img) return;
        if (selPart === null) { return; }
        ev.stopPropagation();
        const rect = ev.currentTarget.getBoundingClientRect();
        const nx = (ev.clientX - rect.left) / (natW * zoom);
        const ny = (ev.clientY - rect.top) / (natH * zoom);
        if (nx < 0 || nx > 1 || ny < 0 || ny > 1) return;
        const updated = { ...hs, [asmId]: [...asmHS.filter(d => d.item !== selPart), { id: Date.now(), item: selPart, nx, ny }] };
        onHsChange(updated);
      }

      function removeHS(id, ev) { ev.stopPropagation(); onHsChange({ ...hs, [asmId]: asmHS.filter(d => d.id !== id) }); }
      function clearHS() { if (!asmHS.length || !confirm('Remove all hotspots for ' + asmId + '?')) return; onHsChange({ ...hs, [asmId]: [] }); }
      function exportJSON() {
        const blob = new Blob([JSON.stringify(hs, null, 2)], { type: 'application/json' });
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = u; a.download = 'beretta_hotspots.json'; a.click(); URL.revokeObjectURL(u);
      }
      function handleImport(ev) {
        const f = ev.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = re => { try { onHsChange(JSON.parse(re.target.result)); } catch { alert('Invalid JSON'); } };
        r.readAsText(f); ev.target.value = '';
      }

      const dW = natW * zoom, dH = natH * zoom;
      const editCursor = editMode ? (selPart !== null ? 'crosshair' : 'not-allowed') : 'default';

      return h('div', { style: { display: 'flex', flexDirection: 'column', height: height + 'px', flexShrink: 0, borderBottom: '1px solid var(--border)' } },
        h('canvas', { ref: canvasRef, style: { display: 'none' } }),

        // ── TOOLBAR ──
        h('div', { className: 'diag-bar' },
          h('button', { className: 'btn', onClick: () => fileRef.current?.click(), title: 'Load a PNG, JPG or PDF drawing' }, '📂 Load drawing'),
          h('input', { ref: fileRef, type: 'file', accept: 'image/*,.pdf', style: { display: 'none' }, onChange: handleFile }),

          pdfTotal > 0 && h(React.Fragment, null,
            h('div', { className: 'd-sep' }),
            h('button', { className: 'zoom-btn', onClick: () => navPdf(-1), disabled: pdfPage <= 1 }, '‹'),
            h('span', { style: { fontSize: '11px', color: 'var(--text1)', fontFamily: 'var(--font-mono)', padding: '0 4px' } }, pdfPage + ' / ' + pdfTotal),
            h('button', { className: 'zoom-btn', onClick: () => navPdf(1), disabled: pdfPage >= pdfTotal }, '›')
          ),

          h('div', { className: 'd-sep' }),
          h('div', { className: 'zoom-ctrl' },
            h('button', { className: 'zoom-btn', onClick: () => setZoom(z => Math.max(0.2, +(z - 0.25).toFixed(2))), disabled: !img }, '−'),
            h('span', { className: 'zoom-val' }, Math.round(zoom * 100) + '%'),
            h('button', { className: 'zoom-btn', onClick: () => setZoom(z => Math.min(5, +(z + 0.25).toFixed(2))), disabled: !img }, '+'),
            h('button', { className: 'zoom-btn', onClick: () => setZoom(1), disabled: !img, title: 'Reset zoom', style: { fontSize: '10px', width: 'auto', padding: '0 6px' } }, '1:1'),
            h('button', { className: 'zoom-btn', onClick: () => setZoom(0.5), disabled: !img, title: 'Fit 50%', style: { fontSize: '10px', width: 'auto', padding: '0 6px' } }, '50%')
          ),

          h('div', { style: { flex: 1 } }),

          asmHS.length > 0 && h('span', { style: { fontSize: '10px', background: 'var(--amberBg)', color: 'var(--amber)', border: '1px solid var(--amber3)', borderRadius: '10px', padding: '2px 8px', flexShrink: 0 } },
            asmHS.length + ' hotspot' + (asmHS.length !== 1 ? 's' : '')
          ),

          editMode && asmHS.length > 0 && h('button', { className: 'btn', onClick: clearHS, style: { color: 'var(--red)', borderColor: '#3b0a0a' } }, '× Clear'),
          img && h('button', { className: 'btn', onClick: () => { if (confirm('Remove drawing for ' + asmId + '?')) { delImg(asmId); setImg(null); setPdfDoc(null); setPdfTotal(0); } }, title: 'Remove saved drawing', style: { color: 'var(--text2)' } }, '🗑'),
          h('div', { className: 'd-sep' }),
          h('button', { className: 'btn', onClick: exportJSON, title: 'Export hotspot coordinates as JSON' }, '↓ JSON'),
          h('label', { className: 'btn', style: { cursor: 'pointer' }, title: 'Import hotspot JSON' }, '↑ JSON', h('input', { ref: importRef, type: 'file', accept: '.json', style: { display: 'none' }, onChange: handleImport }))
        ),

        // ── EDIT MODE BANNER ──
        editMode && h('div', { className: 'edit-banner' },
          h('strong', null, '✏ EDIT MODE'),
          h('span', { className: 'edit-hint-sel' },
            selPart !== null
              ? 'Click on the drawing to place Item ' + selPart + ' hotspot. Click an existing hotspot (●) to remove it.'
              : '← Select a row in the table below, then click on the drawing.'
          )
        ),

        // ── DIAGRAM SCROLL ──
        h('div', { ref: scrollRef, className: 'diag-scroll', style: { position: 'relative' } },
          loading && h('div', { className: 'diag-empty' }, h('div', { style: { color: 'var(--text1)', fontSize: '13px' } }, '⏳ Loading...')),
          !loading && !img && h('div', { className: 'diag-empty' },
            h('div', { className: 'diag-empty-icon' }, '🖼'),
            h('div', { className: 'diag-empty-title' }, 'No drawing loaded for this assembly'),
            h('div', { className: 'diag-tip' },
              h('strong', null, '💡 Quick start: '), 'Export a PDF page as PNG from Adobe Reader (File → Export → Image), or take a screenshot of the drawing. Then click 📂 Load drawing.',
              h('br'), h('br'),
              'Once loaded, activate ', h('strong', null, 'Edit Hotspots'), ' (toggle above the table), select a row, and click on the drawing to place the marker.'
            )
          ),
          !loading && img && h('div', {
            style: { position: 'relative', width: dW + 'px', height: dH + 'px', flexShrink: 0, cursor: editCursor },
            onClick: handleDiagClick
          },
            h('img', { src: img, style: { display: 'block', width: '100%', height: '100%', userSelect: 'none', pointerEvents: 'none' }, draggable: false }),
            ...asmHS.map(dot => {
              const isSel = dot.item === selPart;
              const part = parts.find(p => p.n === dot.item);
              return h('div', {
                key: dot.id,
                className: 'hs-dot' + (isSel ? ' hs-sel' : '') + (editMode ? ' hs-edit' : ''),
                style: { left: (dot.nx * 100) + '%', top: (dot.ny * 100) + '%', transform: 'translate(-50%,-50%)', zIndex: isSel ? 25 : 5 },
                title: editMode ? 'Click to remove marker for item ' + dot.item : 'Item ' + dot.item,
                onClick: ev => { ev.stopPropagation(); if (editMode) { removeHS(dot.id, ev); } else { onPartSel(dot.item); } },
                onMouseEnter: ev => { if (!editMode && part) setTooltip({ part, x: ev.clientX, y: ev.clientY }); },
                onMouseLeave: () => setTooltip(null),
                onMouseMove: ev => { if (tooltip) setTooltip(t => ({ ...t, x: ev.clientX, y: ev.clientY })); }
              }, dot.item);
            })
          )
        ),
        tooltip && h(Tooltip, { part: tooltip.part, mouseX: tooltip.x, mouseY: tooltip.y })
      );

    // ─────────────────────────────────────────────────────────────────
    // RESIZE HANDLE
    // ─────────────────────────────────────────────────────────────────
    function ResizeH({ onDrag }) {
      const drag = useRef(false);
      function down(ev) {
        ev.preventDefault(); drag.current = true;
        document.body.style.userSelect = 'none'; document.body.style.cursor = 'ns-resize';
        const move = ev => drag.current && onDrag(ev.clientY);
        const up = () => {
          drag.current = false; document.body.style.userSelect = ''; document.body.style.cursor = '';
          document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up);
        };
        document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
      }
      return h('div', { className: 'resize-h', onMouseDown: down, title: 'Drag to resize' });
    }

    // ─────────────────────────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────────────────────────
    function App({ selModel }) {
      const [selAsm, setSelAsm] = useState(null);
      const [search, setSearch] = useState('');
      const [openG, setOpenG] = useState({});
      const [showDiag, setShowDiag] = useState(true);
      const [diagH, setDiagH] = useState(320);
      const [editMode, setEditMode] = useState(false);
      const [selPart, setSelPart] = useState(null);
      const [hs, setHs] = useState(loadHS);
      const contentRef = useRef(null);
      const tableRef = useRef(null);

      const model = useMemo(() => DB.models.find(m => m.id === selModel), [selModel]);
      const grouped = useMemo(() => { const g = {}; model.assemblies.forEach(a => { if (!g[a.group]) g[a.group] = []; g[a.group].push(a); }); return g; }, [model]);
      const asm = useMemo(() => selAsm ? model.assemblies.find(a => a.id === selAsm) : null, [selAsm, model]);
      const asmHS = useMemo(() => hs[selAsm] || [], [hs, selAsm]);

      const filtered = useMemo(() => {
        if (!asm) return [];
        if (!search.trim()) return asm.parts;
        const q = search.toLowerCase();
        return asm.parts.filter(p => (p.c || '').toLowerCase().includes(q) || (p.it || '').toLowerCase().includes(q) || (p.en || '').toLowerCase().includes(q) || (p.pn || '').toLowerCase().includes(q) || String(p.n).includes(q));
      }, [asm, search]);

      const totalParts = useMemo(() => model.assemblies.reduce((s, a) => s + a.parts.length, 0), [model]);

      useEffect(() => { saveHS(hs); }, [hs]);

      // Scroll table row into view when part selected via hotspot
      useEffect(() => {
        if (selPart === null || !tableRef.current) return;
        const row = tableRef.current.querySelector('[data-n="' + selPart + '"]');
        if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, [selPart]);

      useEffect(() => { setSelPart(null); setEditMode(false); }, [selAsm]);

      function selectPart(n) { setSelPart(prev => prev === n ? null : n); }
      function toggleG(g) { setOpenG(prev => ({ ...prev, [g]: !prev[g] })); }
      function selectAsm(id) { setSelAsm(id); setSearch(''); }
      function handleResize(y) {
        if (!contentRef.current) return;
        const r = contentRef.current.getBoundingClientRect();
        setDiagH(Math.max(120, Math.min(y - r.top - 44, r.height - 200)));
      }

      return h('div', { className: 'main-layout' },
        // ── SIDEBAR ──
        h('div', { className: 'sidebar' },
          h('div', { className: 'sidebar-header' },
            h('span', { className: 'sidebar-title' }, 'Component Tree'),
            h('span', { style: { fontSize: '10px', color: 'var(--text2)' } }, model.assemblies.length + ' asm')
          ),
          h('div', { className: 'sidebar-scroll' },
            Object.entries(grouped).map(([grp, asms]) => {
              const open = openG[grp] !== false;
              const gi = GROUPS[grp] || { icon: '📋', c: '#888' };
              return h('div', { key: grp, className: 'model-group' },
                h('div', { className: 'model-header', style: { borderLeftColor: gi.c }, onClick: () => toggleG(grp) },
                  h('span', { style: { fontSize: '12px' } }, gi.icon),
                  h('span', { style: { fontWeight: 700, fontSize: '12px', color: gi.c, letterSpacing: '0.5px' } }, grp),
                  h('span', { className: 'grp-chevron' + (open ? ' open' : '') }, open ? '▶' : '▶'),
                  h('span', { className: 'model-desc' }, asms.length)
                ),
                open && asms.map(a => {
                  const hasHS = (hs[a.id] || []).length > 0;
                  return h('div', {
                    key: a.id,
                    className: 'tree-item' + (selAsm === a.id ? ' active' : ''),
                    onClick: () => selectAsm(a.id)
                  },
                    h('div', { className: 'ti-body' },
                      h('div', { className: 'ti-label' }, a.title),
                      h('div', { className: 'ti-code' }, a.id + ' · ' + a.drawing)
                    ),
                    h('div', { className: 'ti-right' },
                      hasHS && h('div', { className: 'ti-hsdot', title: 'Has hotspots mapped' }),
                      h('div', { className: 'ti-badge' }, a.parts.length)
                    )
                  );
                })
              );
            })
          )
        ),

        // ── CONTENT ──
        h('div', { ref: contentRef, className: 'content' },
          asm
            ? h(React.Fragment, null,
              // Assembly header
              h('div', { className: 'asm-header' },
                h('div', { className: 'asm-top' },
                  h('span', { className: 'asm-id' }, asm.id),
                  h('span', { className: 'asm-title' }, asm.title),
                  h('span', { className: 'ml-auto', style: { display: 'flex', gap: '8px', alignItems: 'center' } },
                    // Edit hotspots toggle (subtle, for advanced use)
                    showDiag && h('button', {
                      className: 'btn-edit' + (editMode ? ' on' : ''),
                      onClick: () => { setEditMode(m => !m); if (!showDiag) setShowDiag(true); },
                      title: 'Toggle hotspot editor'
                    }, '✏ ' + (editMode ? 'Editing…' : 'Edit Hotspots')),
                    h('button', {
                      className: 'btn ' + (showDiag ? 'on' : ''),
                      onClick: () => { setShowDiag(s => !s); if (editMode && showDiag) setEditMode(false); },
                      title: showDiag ? 'Hide drawing panel' : 'Show drawing panel'
                    }, showDiag ? '▲ Drawing' : '▼ Drawing')
                  )
                ),
                h('div', { className: 'asm-meta' },
                  h('span', { className: 'asm-meta-i' }, 'Drawing: ', h('span', null, asm.drawing)),
                  h('span', { className: 'asm-meta-i' }, 'EN: ', h('span', null, asm.titleEN)),
                  h('span', { className: 'asm-meta-i' }, 'Parts: ', h('span', null, asm.parts.length)),
                  h('span', { className: 'asm-meta-i' }, 'Group: ', h('span', null, asm.group)),
                  asmHS.length > 0 && h('span', { className: 'asm-meta-i', style: { color: 'var(--amber)' } },
                    '📍 ', h('span', { style: { color: 'var(--amber)' } }, asmHS.length + ' hotspots mapped')
                  )
                )
              ),

              // Diagram (collapsible)
              showDiag && h(DiagramPanel, {
                asmId: selAsm,
                parts: asm.parts,
                hs, onHsChange: setHs,
                selPart, onPartSel: selectPart,
                height: diagH,
                editMode
              }),
              showDiag && h(ResizeH, { onDrag: handleResize }),

              // Search bar
              h('div', { className: 'search-bar' },
                h('span', { style: { fontSize: '14px', lineHeight: '1', color: 'var(--text2)' } }, '\uD83D\uDD0D'),
                h('input', { type: 'text', placeholder: 'Search: item number, code, description, part number…', value: search, onChange: ev => setSearch(ev.target.value) }),
                selPart !== null && h('div', { className: 'sel-chip', onClick: () => setSelPart(null), title: 'Click to deselect' },
                  '📍 Item ' + selPart,
                  asmHS.some(d => d.item === selPart) ? h('span', { style: { color: 'var(--amber)' } }, '●') : null,
                  ' ×'
                ),
                search && h('span', { className: 'res-count', onClick: () => setSearch('') }, filtered.length + ' results — clear ×')
              ),

              // BOM table
              h('div', { ref: tableRef, className: 'table-wrap' },
                h('table', { className: 'parts-table' },
                  h('thead', null,
                    h('tr', null,
                      h('th', { className: 'th-c', style: { width: '52px' } }, 'Item'),
                      h('th', { style: { width: '165px' } }, 'ID Code'),
                      h('th', null, 'Description'),
                      h('th', { className: 'th-c', style: { width: '52px' } }, 'Qty'),
                      h('th', { style: { width: '145px' } }, 'Part Number')
                    )
                  ),
                  h('tbody', null,
                    filtered.length === 0
                      ? h('tr', null, h('td', { colSpan: 5, style: { textAlign: 'center', padding: '32px', color: 'var(--text2)' } }, 'No parts match — ', h('span', { style: { cursor: 'pointer', color: 'var(--blue)' }, onClick: () => setSearch('') }, 'clear search')))
                      : filtered.map(p => {
                        const isSel = p.n === selPart;
                        const hasHS = asmHS.some(d => d.item === p.n);
                        return h('tr', {
                          key: p.n,
                          'data-n': p.n,
                          className: (p.sp ? 'tr-special ' : '') + (isSel ? 'tr-sel' : ''),
                          onClick: () => selectPart(p.n),
                          title: 'Click to link with drawing'
                        },
                          h('td', { className: 'td-item' }, p.n, hasHS && h('span', { className: 'hs-mini-dot', title: 'Hotspot mapped on drawing' })),
                          h('td', null, h('div', { className: 'td-code' }, p.c ? h(HL, { t: p.c, q: search }) : h('span', { style: { color: 'var(--text2)' } }, '—'))),
                          h('td', null, h('div', { className: 'td-it' }, h(HL, { t: p.it, q: search })), h('div', { className: 'td-en' }, h(HL, { t: p.en, q: search }))),
                          h('td', { className: 'td-qty' }, p.q),
                          h('td', null, h('span', { className: 'td-pn' + (p.sp ? ' spec' : '') }, h(HL, { t: p.pn, q: search })))
                        );
                      })
                  )
                )
              )
            )
            : h('div', { className: 'welcome' },
              h('div', { style: { fontSize: '44px', opacity: '.15' } }, '⚙'),
              h('div', { className: 'welcome-title' }, 'Beretta Electronic Parts Catalog'),
              h('div', { className: 'welcome-sub' }, 'Select an assembly from the component tree on the left. Load a drawing, map hotspots once, then click any marker or row to navigate instantly.'),
              h('div', { className: 'welcome-stats' },
                h('div', { className: 'stat-box' }, h('div', { className: 'stat-num' }, model.assemblies.length), h('div', { className: 'stat-lbl' }, 'Assemblies')),
                h('div', { className: 'stat-box' }, h('div', { className: 'stat-num' }, totalParts), h('div', { className: 'stat-lbl' }, 'Total Parts')),
                h('div', { className: 'stat-box' }, h('div', { className: 'stat-num' }, model.sn !== '—' ? model.sn : '—'), h('div', { className: 'stat-lbl' }, 'Serial No.'))
              )
            )
        )
      );
    }

    // ─────────────────────────────────────────────────────────────────
    // ROOT
    // ─────────────────────────────────────────────────────────────────
    function Root() {
      const [sel, setSel] = useState('T46');
      const model = DB.models.find(m => m.id === sel);
      return h('div', { style: { display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' } },
        h('div', { className: 'topbar' },
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', marginRight: '6px' } },
            h('div', { className: 'logo-box' }, 'BERETTA'),
            h('div', { className: 'logo-sub' }, 'EPC · v3')
          ),
          h('div', { className: 'divider' }),
          h('span', { className: 'tag tag-amber' }, 'ALFREDO s.r.l.'),
          h('div', { className: 'divider' }),
          h('select', { value: sel, onChange: ev => setSel(ev.target.value) },
            DB.models.map(m => h('option', { key: m.id, value: m.id }, 'Model: ' + m.id))
          ),
          h('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px' } },
            h('span', { className: 'sn-label' }, 'Serial No.'),
            h('span', { className: 'sn-value' }, model.sn !== '—' ? model.sn : 'N/A')
          ),
          h('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px' } },
            h('span', { className: 'sn-label' }, 'Engine'),
            h('span', { style: { fontSize: '11px', color: 'var(--text1)' } }, model.engine !== '—' ? model.engine : '—')
          ),
          h('div', { className: 'ml-auto', style: { display: 'flex', gap: '8px', alignItems: 'center' } },
            h('span', { className: 'tag tag-blue' }, 'T46 · 2025'),
            h('span', { style: { fontSize: '10px', color: 'var(--text2)' } }, 'Rev. D · Oct 2025')
          )
        ),
        h(App, { selModel: sel }),
        h('div', { className: 'statusbar' },
          h('div', { className: 'status-dot' }),
          h('span', null, 'Beretta Alfredo s.r.l. — Via Parini 24, 20842 Besana Brianza (MB) Italy'),
          h('span', { style: { marginLeft: 'auto', color: 'var(--text2)' } },
            '📍 Hover hotspot for details · Click row or marker to sync · ✏ Edit Hotspots to map · ↓ JSON to backup'
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(Root));
  </script>
</body>

</html>
