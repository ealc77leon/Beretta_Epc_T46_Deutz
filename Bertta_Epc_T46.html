<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beretta EPC v2 — Electronic Parts Catalog</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg0: #0d0f11;
      --bg1: #13171a;
      --bg2: #1a1f24;
      --bg3: #22282e;
      --bg4: #2c333b;
      --border: #2e3740;
      --border2: #3d4755;
      --text0: #e8edf2;
      --text1: #a8b4c0;
      --text2: #6b7a88;
      --amber: #f59e0b;
      --amber2: #d97706;
      --amber3: #92400e;
      --amberBg: #1c1408;
      --blue: #3b82f6;
      --blueBg: #0c1829;
      --blue3: #1d4ed8;
      --green: #10b981;
      --greenBg: #041810;
      --red: #ef4444;
      --redBg: #180808;
      --font-ui: 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'Consolas', 'Courier New', monospace;
    }

    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: var(--font-ui);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    body.resizing {
      user-select: none;
      cursor: ns-resize
    }

    /* ─── TOPBAR ─── */
    .topbar {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100
    }

    .logo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 8px
    }

    .logo-box {
      background: var(--amber);
      color: #000;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 1px;
      padding: 4px 9px;
      border-radius: 3px
    }

    .logo-sub {
      color: var(--text1);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border2);
      flex-shrink: 0
    }

    .topbar select,
    .topbar input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text0);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none
    }

    .topbar select:focus,
    .topbar input:focus {
      border-color: var(--amber)
    }

    .topbar input {
      width: 220px
    }

    .topbar input::placeholder {
      color: var(--text2)
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase
    }

    .tag-amber {
      background: var(--amberBg);
      color: var(--amber);
      border: 1px solid var(--amber3)
    }

    .tag-blue {
      background: var(--blueBg);
      color: var(--blue);
      border: 1px solid var(--blue3)
    }

    .ml-auto {
      margin-left: auto
    }

    .sn-label {
      color: var(--text2);
      font-size: 11px
    }

    .sn-value {
      color: var(--amber);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700
    }

    /* ─── LAYOUT ─── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 260px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0
    }

    .sidebar-header {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase
    }

    .sidebar-scroll {
      overflow-y: auto;
      flex: 1
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .tree-item {
      display: flex;
      align-items: center;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s
    }

    .tree-item:hover {
      background: var(--bg3)
    }

    .tree-item.active {
      background: var(--amberBg);
      border-left-color: var(--amber)
    }

    .tree-item.active .tree-label {
      color: var(--amber)
    }

    .tree-item.active .tree-code {
      color: var(--amber2)
    }

    .tree-content {
      padding: 5px 8px 5px 12px;
      flex: 1;
      min-width: 0
    }

    .tree-label {
      font-size: 12px;
      color: var(--text1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3
    }

    .tree-code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text2);
      margin-top: 1px
    }

    .tree-parts-badge {
      font-size: 10px;
      color: var(--text2);
      background: var(--bg4);
      border-radius: 8px;
      padding: 1px 6px;
      flex-shrink: 0;
      margin-right: 6px
    }

    .tree-hs-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      margin-right: 8px;
      margin-left: -2px
    }

    .model-group {
      border-bottom: 1px solid var(--border)
    }

    .model-header {
      padding: 7px 10px;
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border-left: 3px solid var(--amber)
    }

    .model-header:hover {
      background: var(--bg3)
    }

    .model-name {
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px
    }

    .model-desc {
      font-size: 10px;
      color: var(--text2);
      margin-left: auto
    }

    /* ─── CONTENT ─── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .content-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      flex-shrink: 0
    }

    .asm-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .asm-code-big {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--amber)
    }

    .asm-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text0)
    }

    .asm-meta {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      flex-wrap: wrap
    }

    .asm-meta-item {
      font-size: 11px;
      color: var(--text2)
    }

    .asm-meta-item span {
      color: var(--text1)
    }

    /* ─── DIAGRAM PANEL ─── */
    .diagram-toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 36px
    }

    .diagram-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-ui);
      white-space: nowrap;
      transition: background 0.1s, color 0.1s
    }

    .diagram-btn:hover {
      background: var(--bg4);
      color: var(--text0)
    }

    .diagram-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed
    }

    .diagram-btn.active {
      background: var(--amberBg);
      border-color: var(--amber3);
      color: var(--amber)
    }

    .diagram-btn-sm {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-mono);
      min-width: 26px;
      text-align: center;
      transition: background 0.1s
    }

    .diagram-btn-sm:hover {
      background: var(--bg4);
      color: var(--text0)
    }

    .diagram-btn-sm:disabled {
      opacity: 0.4;
      cursor: not-allowed
    }

    .diagram-sep {
      width: 1px;
      height: 18px;
      background: var(--border2);
      flex-shrink: 0
    }

    .diagram-scroll {
      flex: 1;
      overflow: auto;
      background: var(--bg0);
      padding: 8px;
      display: flex
    }

    .diagram-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    .diagram-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    .diagram-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text2);
      font-size: 12px;
      text-align: center
    }

    .edit-hint {
      font-size: 10px;
      color: var(--amber);
      font-style: italic;
      padding: 0 3px;
      flex-shrink: 0
    }

    /* ─── RESIZE HANDLE ─── */
    .resize-handle-h {
      height: 6px;
      background: var(--bg1);
      border-top: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      cursor: ns-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.1s
    }

    .resize-handle-h:hover,
    .resize-handle-h.dragging {
      background: var(--amberBg)
    }

    .resize-handle-h::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 2px;
      background: var(--border2);
      border-radius: 2px
    }

    /* ─── HOTSPOT MARKERS ─── */
    .hotspot-marker {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--amber);
      color: #000;
      font-size: 9px;
      font-weight: 800;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(0, 0, 0, 0.45);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      user-select: none;
      line-height: 1
    }

    .hotspot-marker:hover {
      transform: translate(-50%, -50%) scale(1.3);
      z-index: 20 !important
    }

    .hotspot-marker.hs-selected {
      background: var(--green);
      border-color: rgba(0, 255, 120, 0.4);
      transform: translate(-50%, -50%) scale(1.35);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.6), 0 2px 6px rgba(0, 0, 0, 0.7);
      z-index: 15 !important
    }

    .hotspot-marker.edit-mode:hover {
      background: var(--red)
    }

    /* ─── TABLE ─── */
    .table-wrap {
      flex: 1;
      overflow: auto
    }

    .table-wrap::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    .parts-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    .parts-table thead {
      position: sticky;
      top: 0;
      z-index: 10
    }

    .parts-table th {
      background: var(--bg2);
      color: var(--text2);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border2);
      text-align: left;
      white-space: nowrap
    }

    .parts-table th.th-num {
      width: 48px;
      text-align: center
    }

    .parts-table th.th-qty {
      width: 52px;
      text-align: center
    }

    .parts-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle
    }

    .parts-table tr {
      cursor: pointer
    }

    .parts-table tr:hover td {
      background: var(--bg2)
    }

    .parts-table tr.highlighted td {
      background: var(--amberBg)
    }

    .parts-table tr.row-linked td {
      background: #0c1829;
      border-left: 2px solid var(--blue)
    }

    .cell-item {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text2);
      font-weight: 700
    }

    .cell-hs-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--amber);
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle
    }

    .cell-code {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--blue);
      word-break: break-all
    }

    .cell-desc-it {
      color: var(--text0);
      font-size: 12px
    }

    .cell-desc-en {
      color: var(--text2);
      font-size: 11px;
      font-style: italic;
      margin-top: 1px
    }

    .cell-qty {
      text-align: center;
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--text0)
    }

    .cell-partnum {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--amber)
    }

    .cell-partnum.special {
      color: var(--green)
    }

    .special-row td {
      border-left: 2px solid var(--green)
    }

    /* ─── WELCOME / STATUS ─── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text2)
    }

    .welcome-icon {
      font-size: 48px;
      opacity: 0.3
    }

    .welcome-title {
      font-size: 16px;
      color: var(--text1);
      font-weight: 600
    }

    .welcome-sub {
      font-size: 12px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6
    }

    .welcome-stats {
      display: flex;
      gap: 24px;
      margin-top: 8px
    }

    .stat-box {
      text-align: center;
      padding: 12px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--amber);
      font-family: var(--font-mono)
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px
    }

    .statusbar {
      background: var(--bg1);
      border-top: 1px solid var(--border);
      padding: 3px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 10px;
      color: var(--text2);
      flex-shrink: 0
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0
    }

    mark {
      background: var(--amber3);
      color: var(--amber);
      border-radius: 2px;
      padding: 0 2px
    }

    .diag-toggle-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.1s
    }

    .diag-toggle-btn:hover {
      border-color: var(--amber);
      color: var(--amber)
    }

    .diag-toggle-btn.active {
      background: var(--amberBg);
      border-color: var(--amber3);
      color: var(--amber)
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    /* ─── TOOLTIP for hotspot instructions ─── */
    .hs-info-bar {
      padding: 4px 14px;
      background: var(--amberBg);
      border-bottom: 1px solid var(--amber3);
      font-size: 10px;
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0
    }
  </style>
</head>

    // UTILITY COMPONENTS
    // ─────────────────────────────────────────────────────────────
    function HL({ text, q }) {
      if (!q || !text) return text;
      const i = text.toLowerCase().indexOf(q.toLowerCase());
      if (i < 0) return text;
      return ce('span', null, text.slice(0, i), ce('mark', null, text.slice(i, i + q.length)), text.slice(i + q.length));
    }

    // ─────────────────────────────────────────────────────────────
    // RESIZE HANDLE
    // ─────────────────────────────────────────────────────────────
    function ResizeH({ onDrag }) {
      const dragging = useRef(false);
      function onDown(ev) {
        ev.preventDefault();
        dragging.current = true;
        document.body.classList.add('resizing');
        function onMove(ev) { if (dragging.current) onDrag(ev.clientY); }
        function onUp() { dragging.current = false; document.body.classList.remove('resizing'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }
      return ce('div', { className: 'resize-handle-h', onMouseDown: onDown, title: 'Drag to resize' });
    }

    // ─────────────────────────────────────────────────────────────
    // DIAGRAM PANEL — PDF/Image loader + hotspot editor
    // ─────────────────────────────────────────────────────────────
    function DiagramPanel({ assembly, allHotspots, onHotspotsChange, selectedPart, onPartSelect, height }) {
      const [imgSrc, setImgSrc] = useState(null);
      const [natW, setNatW] = useState(1000);
      const [natH, setNatH] = useState(750);
      const [zoom, setZoom] = useState(1.0);
      const [editMode, setEditMode] = useState(false);
      const [pdfRef, setPdfRef] = useState(null);
      const [pdfPage, setPdfPage] = useState(1);
      const [pdfPages, setPdfPages] = useState(0);
      const [loading, setLoading] = useState(false);
      const fileRef = useRef(null);
      const importRef = useRef(null);
      const canvasRef = useRef(null);
      const wrapperRef = useRef(null);
      const asmId = assembly?.id;
      const asmHS = useMemo(() => allHotspots[asmId] || [], [allHotspots, asmId]);

      // Load saved image when assembly changes
      useEffect(() => {
        if (!asmId) { setImgSrc(null); return; }
        try {
          const s = localStorage.getItem('brt_img_' + asmId);
          if (s) {
            setImgSrc(s);
            const tmp = new Image();
            tmp.onload = () => { setNatW(tmp.naturalWidth); setNatH(tmp.naturalHeight); };
            tmp.src = s;
          } else { setImgSrc(null); }
        } catch { setImgSrc(null); }
        setEditMode(false);
      }, [asmId]);

      async function handleFile(ev) {
        const file = ev.target.files[0];
        if (!file) return;
        setLoading(true);
        try {
          if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = re => {
              const src = re.target.result;
              const tmp = new Image();
              tmp.onload = () => { setNatW(tmp.naturalWidth); setNatH(tmp.naturalHeight); setImgSrc(src); setLoading(false); };
              tmp.src = src;
              try { localStorage.setItem('brt_img_' + asmId, src); } catch { console.warn('Image too large for localStorage'); }
            };
            reader.readAsDataURL(file);
          } else if (file.type === 'application/pdf' && window.pdfjsLib) {
            const buf = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            setPdfRef(pdf); setPdfPages(pdf.numPages); setPdfPage(1);
            await doRenderPage(pdf, 1);
            setLoading(false);
          } else { setLoading(false); alert('Supported formats: PNG, JPG, GIF, PDF'); }
        } catch (err) { setLoading(false); console.error(err); alert('Error: ' + err.message); }
        ev.target.value = '';
      }

      async function doRenderPage(pdf, page) {
        if (!canvasRef.current) return;
        const p = await pdf.getPage(page);
        const vp = p.getViewport({ scale: 1.8 });// Render at higher res for quality
        const cv = canvasRef.current;
        cv.width = vp.width; cv.height = vp.height;
        const ctx = cv.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cv.width, cv.height);
        await p.render({ canvasContext: ctx, viewport: vp }).promise;
        const src = cv.toDataURL('image/jpeg', 0.85);
        setImgSrc(src); setNatW(vp.width); setNatH(vp.height);
        try { localStorage.setItem('brt_img_' + asmId, src); } catch { }
      }

      async function navPage(dir) {
        if (!pdfRef) return;
        const next = Math.max(1, Math.min(pdfPages, pdfPage + dir));
        if (next === pdfPage) return;
        setPdfPage(next); setLoading(true);
        await doRenderPage(pdfRef, next);
        setLoading(false);
      }

      function handleImgLoad(ev) { setNatW(ev.target.naturalWidth); setNatH(ev.target.naturalHeight); }

      // ── PLACE HOTSPOT ON CLICK ──
      function handleDiagClick(ev) {
        if (!editMode || !imgSrc || !wrapperRef.current) return;
        ev.stopPropagation();
        if (selectedPart === null) return;
        const rect = wrapperRef.current.getBoundingClientRect();
        const nx = (ev.clientX - rect.left) / rect.width;
        const ny = (ev.clientY - rect.top) / rect.height;
        if (nx < 0 || nx > 1 || ny < 0 || ny > 1) return;
        const newHS = { id: Date.now(), partItem: selectedPart, nx, ny };
        // Replace existing hotspot for same part (one hotspot per part item)
        const updated = { ...allHotspots, [asmId]: [...asmHS.filter(h => h.partItem !== selectedPart), newHS] };
        onHotspotsChange(updated);
      }

      function removeHS(id, ev) {
        ev.stopPropagation();
        onHotspotsChange({ ...allHotspots, [asmId]: asmHS.filter(h => h.id !== id) });
      }

      function clearHS() {
        if (asmHS.length === 0) return;
        if (!confirm('Clear all hotspots for assembly ' + asmId + '?')) return;
        onHotspotsChange({ ...allHotspots, [asmId]: [] });
      }

      function exportHS() {
        const data = JSON.stringify(allHotspots, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'beretta_hotspots_' + new Date().toISOString().slice(0, 10) + '.json'; a.click();
        URL.revokeObjectURL(url);
      }

      function handleImport(ev) {
        const file = ev.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = re => {
          try { onHotspotsChange(JSON.parse(re.target.result)); }
          catch { alert('Invalid JSON file'); }
        };
        reader.readAsText(file); ev.target.value = '';
      }

      function clearImage() {
        if (!confirm('Remove saved drawing for ' + asmId + '?')) return;
        setImgSrc(null); setPdfRef(null); setPdfPages(0); setPdfPage(1);
        try { localStorage.removeItem('brt_img_' + asmId); } catch { }
      }

      const displayW = Math.round(natW * zoom);
      const displayH = Math.round(natH * zoom);
      const editCursor = editMode ? (selectedPart !== null ? 'crosshair' : 'not-allowed') : 'default';

      return ce('div', { style: { display: 'flex', flexDirection: 'column', height: height + 'px', overflow: 'hidden', background: 'var(--bg1)', borderBottom: '1px solid var(--border)' } },
        // Hidden canvas for PDF → image conversion
        ce('canvas', { ref: canvasRef, style: { display: 'none' } }),

        // ── TOOLBAR ──
        ce('div', { className: 'diagram-toolbar' },
          ce('button', { className: 'diagram-btn', onClick: () => fileRef.current?.click() }, '📂 Load PNG/JPG/PDF'),
          ce('input', { ref: fileRef, type: 'file', accept: 'image/*,.pdf', style: { display: 'none' }, onChange: handleFile }),

          pdfPages > 0 && ce(React.Fragment, null,
            ce('div', { className: 'diagram-sep' }),
            ce('button', { className: 'diagram-btn-sm', onClick: () => navPage(-1), disabled: pdfPage <= 1 }, '◀'),
            ce('span', { style: { fontSize: '11px', color: 'var(--text1)', fontFamily: 'var(--font-mono)', padding: '0 4px' } }, pdfPage + '/' + pdfPages),
            ce('button', { className: 'diagram-btn-sm', onClick: () => navPage(1), disabled: pdfPage >= pdfPages }, '▶')
          ),

          ce('div', { className: 'diagram-sep' }),
          ce('button', { className: 'diagram-btn-sm', onClick: () => setZoom(z => Math.max(0.2, +(z - 0.25).toFixed(2))), disabled: !imgSrc }, '−'),
          ce('span', { style: { fontSize: '11px', color: 'var(--text1)', fontFamily: 'var(--font-mono)', minWidth: '40px', textAlign: 'center' } }, Math.round(zoom * 100) + '%'),
          ce('button', { className: 'diagram-btn-sm', onClick: () => setZoom(z => Math.min(5, +(z + 0.25).toFixed(2))), disabled: !imgSrc }, '+'),
          ce('button', { className: 'diagram-btn-sm', onClick: () => setZoom(1), disabled: !imgSrc }, '1:1'),
          ce('button', { className: 'diagram-btn-sm', onClick: () => setZoom(0.5), disabled: !imgSrc }, '50%'),

          ce('div', { className: 'diagram-sep' }),

          // Edit mode toggle
          ce('button', {
            className: 'diagram-btn' + (editMode ? ' active' : ''),
            onClick: () => setEditMode(m => !m),
            disabled: !imgSrc,
            title: 'Enable hotspot placement mode'
          }, '✏ ' + (editMode ? 'Edit ON' : 'Edit Hotspots')),

          editMode && ce('span', { className: 'edit-hint' },
            selectedPart !== null ? '→ Click diagram to place item ' + selectedPart : '← Select a row first'
          ),

          asmHS.length > 0 && ce('button', { className: 'diagram-btn-sm', onClick: clearHS, style: { color: 'var(--red)', borderColor: '#450a0a' }, title: 'Remove all hotspots for this assembly' }, '× Clear All'),

          ce('div', { style: { flex: 1 } }),

          // Hotspot count
          asmHS.length > 0 && ce('span', { style: { fontSize: '10px', background: 'var(--amberBg)', color: 'var(--amber)', border: '1px solid var(--amber3)', borderRadius: '10px', padding: '1px 8px', flexShrink: 0 } },
            asmHS.length + (asmHS.length === 1 ? ' hotspot' : ' hotspots')
          ),

          imgSrc && ce('button', { className: 'diagram-btn-sm', onClick: clearImage, title: 'Remove saved drawing' }, '🗑'),
          ce('div', { className: 'diagram-sep' }),
          ce('button', { className: 'diagram-btn-sm', onClick: exportHS, title: 'Export all hotspot coordinates as JSON' }, '↓ Export'),
          ce('label', { className: 'diagram-btn-sm', style: { cursor: 'pointer' }, title: 'Import hotspot JSON' },
            '↑ Import',
            ce('input', { ref: importRef, type: 'file', accept: '.json', style: { display: 'none' }, onChange: handleImport })
          )
        ),

        // Edit mode info bar
        editMode && ce('div', { className: 'hs-info-bar' },
          ce('span', null, '✏ EDIT MODE'),
          ce('span', { style: { color: 'var(--text1)' } },
            selectedPart !== null
              ? 'Click anywhere on the drawing to place hotspot for Item ' + selectedPart + '. Click an existing hotspot to remove it.'
              : 'Click a row in the table below to select a part, then click on the drawing to place its hotspot.'
          )
        ),

        // ── DIAGRAM SCROLL AREA ──
        ce('div', { className: 'diagram-scroll' },
          loading && ce('div', { style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text2)', gap: '8px' } },
            ce('span', { style: { fontSize: '18px', animation: 'spin 1s linear infinite' } }, '⏳'),
            ce('span', null, 'Rendering...')
          ),

          !loading && !imgSrc && ce('div', { className: 'diagram-empty' },
            ce('div', { style: { fontSize: '36px', opacity: '0.15', marginBottom: '4px' } }, '🖼'),
            ce('div', { style: { color: 'var(--text1)', fontWeight: '500' } }, 'No drawing loaded for this assembly'),
            ce('div', { style: { color: 'var(--text2)', fontSize: '11px', marginTop: '4px' } }, 'Click  📂 Load  to import a PNG, JPG, or PDF drawing'),
            ce('div', { style: { fontSize: '10px', color: 'var(--text2)', marginTop: '8px', background: 'var(--bg2)', padding: '6px 12px', borderRadius: '4px', border: '1px solid var(--border)', maxWidth: '400px', lineHeight: '1.7' } },
              ce('strong', { style: { color: 'var(--amber)' } }, '\uD83D\uDCA1 Tip: '), 'Export PDF pages as PNG from Adobe Reader or browser print → Save as PDF-PNG. Then load here and use Edit Hotspots mode to link parts.'
            )
          ),

          !loading && imgSrc && ce('div', {
            ref: wrapperRef,
            style: {
              position: 'relative',
              width: displayW + 'px',
              height: displayH + 'px',
              flexShrink: 0,
              cursor: editCursor,
              alignSelf: 'flex-start'
            },
            onClick: handleDiagClick
          },
            ce('img', {
              src: imgSrc,
              onLoad: handleImgLoad,
              style: { display: 'block', width: '100%', height: '100%', userSelect: 'none', pointerEvents: 'none' },
              draggable: false
            }),
            // ── HOTSPOT MARKERS ──
            ...asmHS.map(hs => {
              const isSel = hs.partItem === selectedPart;
              return ce('div', {
                key: hs.id,
                className: 'hotspot-marker' + (isSel ? ' hs-selected' : '') + (editMode ? ' edit-mode' : ''),
                style: {
                  position: 'absolute',
                  left: (hs.nx * 100) + '%',
                  top: (hs.ny * 100) + '%',
                  transform: 'translate(-50%,-50%)',
                  zIndex: isSel ? 10 : 5
                },
                title: editMode ? 'Click to remove hotspot for item ' + hs.partItem : 'Item ' + hs.partItem + ' — Click to jump to row',
                onClick: ev => {
                  ev.stopPropagation();
                  if (editMode) { removeHS(hs.id, ev); }
                  else { onPartSelect(hs.partItem); }
                }
              }, hs.partItem);
            })
          )
        )
      );
    }

    // ─────────────────────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────────────────────
    function App({ selModel }) {
      const [selAsm, setSelAsm] = useState(null);
      const [search, setSearch] = useState('');
      const [openGroups, setOpenGroups] = useState({});
      const [showDiag, setShowDiag] = useState(false);
      const [diagH, setDiagH] = useState(340);
      const [selectedPart, setSelectedPart] = useState(null);
      const [allHotspots, setAllHotspots] = useState(() => {
        try { return JSON.parse(localStorage.getItem('brt_hs') || '{}'); }
        catch { return {}; }
      });
      const contentRef = useRef(null);
      const tableRef = useRef(null);

      const model = useMemo(() => DB.models.find(m => m.id === selModel), [selModel]);

      const groupedAsms = useMemo(() => {
        const g = {};
        model.assemblies.forEach(a => { if (!g[a.group]) g[a.group] = []; g[a.group].push(a); });
        return g;
      }, [model]);

      const assembly = useMemo(() => selAsm ? model.assemblies.find(a => a.id === selAsm) : null, [selAsm, model]);

      const filteredParts = useMemo(() => {
        if (!assembly) return [];
        if (!search.trim()) return assembly.parts;
        const q = search.toLowerCase();
        return assembly.parts.filter(p =>
          (p.idCode || '').toLowerCase().includes(q) ||
          (p.descIT || '').toLowerCase().includes(q) ||
          (p.descEN || '').toLowerCase().includes(q) ||
          (p.pn || '').toLowerCase().includes(q) ||
          String(p.item).includes(q)
        );
      }, [assembly, search]);

      const totalParts = useMemo(() => model.assemblies.reduce((s, a) => s + a.parts.length, 0), [model]);
      const asmHS = useMemo(() => allHotspots[selAsm] || [], [allHotspots, selAsm]);

      // Persist hotspots
      useEffect(() => {
        try { localStorage.setItem('brt_hs', JSON.stringify(allHotspots)); } catch { }
      }, [allHotspots]);

      // Bidirectional: scroll table to selected part when changed by hotspot click
      useEffect(() => {
        if (selectedPart === null || !tableRef.current) return;
        const row = tableRef.current.querySelector('[data-item="' + selectedPart + '"]');
        if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, [selectedPart]);

      // Reset selected part when assembly changes
      useEffect(() => { setSelectedPart(null); }, [selAsm]);

      const toggleGroup = useCallback(g => setOpenGroups(prev => ({ ...prev, [g]: !prev[g] })), []);

      const selectAsm = useCallback(id => { setSelAsm(id); setSearch(''); setSelectedPart(null); }, []);

      function handleResize(clientY) {
        if (!contentRef.current) return;
        const rect = contentRef.current.getBoundingClientRect();
        setDiagH(Math.max(120, Math.min(clientY - rect.top - 44, rect.height - 180)));
      }

      function handlePartSelect(itemNum) {
        setSelectedPart(itemNum === selectedPart ? null : itemNum);
      }

      return ce('div', { className: 'main-layout' },
        // ── SIDEBAR ──
        ce('div', { className: 'sidebar' },
          ce('div', { className: 'sidebar-header' }, ce('div', { className: 'sidebar-title' }, 'COMPONENT TREE')),
          ce('div', { className: 'sidebar-scroll' },
            Object.entries(groupedAsms).map(([grp, asms]) => {
              const open = openGroups[grp] !== false;
              const gi = GROUPS[grp] || { icon: '📋', color: '#888' };
              return ce('div', { key: grp, className: 'model-group' },
                ce('div', {
                  className: 'model-header',
                  style: { borderLeftColor: gi.color },
                  onClick: () => toggleGroup(grp)
                },
                  ce('span', { style: { fontSize: '12px' } }, gi.icon),
                  ce('span', { className: 'model-name', style: { color: gi.color } }, grp),
                  ce('span', { className: 'model-desc' }, asms.length + ' asm'),
                  ce('span', { style: { color: 'var(--text2)', fontSize: '10px', marginLeft: '4px', display: 'inline-block', transform: open ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' } }, '▶')
                ),
                open && asms.map(a => {
                  const hasHS = (allHotspots[a.id] || []).length > 0;
                  return ce('div', {
                    key: a.id,
                    className: 'tree-item' + (selAsm === a.id ? ' active' : ''),
                    onClick: () => selectAsm(a.id)
                  },
                    ce('div', { className: 'tree-content' },
                      ce('div', { className: 'tree-label' }, a.title),
                      ce('div', { className: 'tree-code' }, a.id + ' · ' + a.drawing)
                    ),
                    hasHS && ce('div', { className: 'tree-hs-dot', title: 'Has hotspots' }),
                    ce('div', { className: 'tree-parts-badge' }, a.parts.length)
                  );
                })
              );
            })
          )
        ),

        // ── CONTENT ──
        ce('div', { ref: contentRef, className: 'content' },
          assembly
            ? ce('div', { style: { display: 'flex', flexDirection: 'column', flex: 1, overflow: 'hidden' } },

              // Content header
              ce('div', { className: 'content-header' },
                ce('div', { className: 'asm-title-row' },
                  ce('span', { className: 'asm-code-big' }, assembly.id),
                  ce('span', { className: 'asm-name' }, assembly.title),
                  ce('button', {
                    className: 'diag-toggle-btn' + (showDiag ? ' active' : ''),
                    style: { marginLeft: 'auto' },
                    onClick: () => setShowDiag(s => !s),
                    title: showDiag ? 'Hide drawing panel' : 'Show drawing panel'
                  }, showDiag ? '🖼 Hide Drawing' : '🖼 Show Drawing'),
                  !showDiag && asmHS.length > 0 && ce('span', { style: { fontSize: '10px', background: 'var(--amberBg)', color: 'var(--amber)', border: '1px solid var(--amber3)', borderRadius: '10px', padding: '1px 7px' } }, asmHS.length + ' hotspots saved')
                ),
                ce('div', { className: 'asm-meta' },
                  ce('span', { className: 'asm-meta-item' }, 'Drawing: ', ce('span', null, assembly.drawing)),
                  ce('span', { className: 'asm-meta-item' }, 'EN: ', ce('span', null, assembly.titleEN)),
                  ce('span', { className: 'asm-meta-item' }, 'Parts: ', ce('span', null, assembly.parts.length)),
                  ce('span', { className: 'asm-meta-item' }, 'Group: ', ce('span', null, assembly.group))
                )
              ),

              // Diagram panel (collapsible)
              showDiag && ce(DiagramPanel, {
                assembly,
                allHotspots,
                onHotspotsChange: setAllHotspots,
                selectedPart,
                onPartSelect: handlePartSelect,
                height: diagH
              }),

              showDiag && ce(ResizeH, { onDrag: handleResize }),

              // Search + status bar
              ce('div', { style: { padding: '6px 14px', borderBottom: '1px solid var(--border)', background: 'var(--bg1)', flexShrink: 0, display: 'flex', gap: '8px', alignItems: 'center' } },
                ce('span', { style: { color: 'var(--text2)', fontSize: '11px' } }, '🔍'),
                ce('input', {
                  type: 'text', placeholder: 'Search item, code, description, part number...',
                  value: search, onChange: ev => setSearch(ev.target.value),
                  style: { flex: 1, maxWidth: '360px', fontSize: '12px' }
                }),
                selectedPart !== null && ce('button', {
                  style: { background: 'var(--blueBg)', color: 'var(--blue)', border: '1px solid var(--blue3)', borderRadius: '10px', padding: '1px 8px', fontSize: '10px', cursor: 'pointer', fontFamily: 'var(--font-ui)' },
                  onClick: () => setSelectedPart(null),
                  title: 'Clear selection'
                }, '🔗 Linked: item ' + selectedPart + ' ×'),
                search && ce('span', {
                  style: { fontSize: '11px', color: 'var(--text2)', cursor: 'pointer' },
                  onClick: () => setSearch('')
                }, filteredParts.length + ' results ✕')
              ),

              // ── TABLE ──
              ce('div', { ref: tableRef, className: 'table-wrap' },
                ce('table', { className: 'parts-table' },
                  ce('thead', null,
                    ce('tr', null,
                      ce('th', { className: 'th-num' }, 'Item'),
                      ce('th', { style: { width: '170px' } }, 'ID Code'),
                      ce('th', null, 'Description (IT / EN)'),
                      ce('th', { className: 'th-qty' }, 'Qty'),
                      ce('th', { style: { width: '140px' } }, 'Part Number')
                    )
                  ),
                  ce('tbody', null,
                    filteredParts.length === 0
                      ? ce('tr', null, ce('td', { colSpan: 5, style: { textAlign: 'center', padding: '32px', color: 'var(--text2)' } }, 'No parts match your search'))
                      : filteredParts.map(p => {
                        const isLinked = p.item === selectedPart;
                        const hasHS = asmHS.some(h => h.partItem === p.item);
                        return ce('tr', {
                          key: p.item,
                          'data-item': p.item,
                          className: (p.special ? 'special-row ' : '') + (isLinked ? 'row-linked' : ''),
                          title: isLinked ? 'Click to deselect' : 'Click to select and link with diagram',
                          onClick: () => handlePartSelect(p.item)
                        },
                          ce('td', { className: 'cell-item' },
                            p.item,
                            hasHS && ce('span', { className: 'cell-hs-dot', title: 'Has hotspot on diagram' })
                          ),
                          ce('td', null, ce('div', { className: 'cell-code' }, p.idCode ? ce(HL, { text: p.idCode, q: search }) : ce('span', { style: { color: 'var(--text2)' } }, '—'))),
                          ce('td', null,
                            ce('div', { className: 'cell-desc-it' }, ce(HL, { text: p.descIT, q: search })),
                            ce('div', { className: 'cell-desc-en' }, ce(HL, { text: p.descEN, q: search }))
                          ),
                          ce('td', { className: 'cell-qty' }, p.qty),
                          ce('td', null, ce('span', { className: 'cell-partnum' + (p.special ? ' special' : '') }, ce(HL, { text: p.pn, q: search })))
                        );
                      })
                  )
                )
              )
            )
            : ce('div', { className: 'welcome' },
              ce('div', { className: 'welcome-icon' }, '⚙'),
              ce('div', { className: 'welcome-title' }, 'Beretta Electronic Parts Catalog'),
              ce('div', { className: 'welcome-sub' }, 'Select an assembly from the navigation tree to view its Bill of Materials and load technical drawings'),
              ce('div', { className: 'welcome-stats' },
                ce('div', { className: 'stat-box' }, ce('div', { className: 'stat-num' }, model.assemblies.length), ce('div', { className: 'stat-lbl' }, 'Assemblies')),
                ce('div', { className: 'stat-box' }, ce('div', { className: 'stat-num' }, totalParts), ce('div', { className: 'stat-lbl' }, 'Total Parts')),
                ce('div', { className: 'stat-box' }, ce('div', { className: 'stat-num' }, model.sn !== '—' ? model.sn : '—'), ce('div', { className: 'stat-lbl' }, 'Serial No.'))
              )
            )
        )
      );
    }

    // ─────────────────────────────────────────────────────────────
    // ROOT + STATUS BAR
    // ─────────────────────────────────────────────────────────────
    function Root() {
      const [selModel, setSelModel] = useState('T46');
      const model = DB.models.find(m => m.id === selModel);
      return ce('div', { style: { display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' } },
        // Topbar
        ce('div', { className: 'topbar' },
          ce('div', { className: 'logo-badge' },
            ce('div', { className: 'logo-box' }, 'BERETTA'),
            ce('div', { className: 'logo-sub' }, 'EPC v2')
          ),
          ce('div', { className: 'divider' }),
          ce('span', { className: 'tag tag-amber' }, 'ALFREDO s.r.l.'),
          ce('div', { className: 'divider' }),
          ce('select', { value: selModel, onChange: ev => setSelModel(ev.target.value), style: { fontWeight: '700', fontSize: '13px' } },
            DB.models.map(m => ce('option', { key: m.id, value: m.id }, 'Model: ' + m.id))
          ),
          ce('div', { style: { display: 'flex', flexDirection: 'column', lineHeight: '1.2' } },
            ce('span', { className: 'sn-label' }, 'Serial Number'),
            ce('span', { className: 'sn-value' }, model.sn !== '—' ? model.sn : 'N/A')
          ),
          ce('div', { style: { display: 'flex', flexDirection: 'column', lineHeight: '1.2' } },
            ce('span', { className: 'sn-label' }, 'Engine'),
            ce('span', { style: { fontSize: '11px', color: 'var(--text1)' } }, model.engine !== '—' ? model.engine : '—')
          ),
          ce('div', { className: 'ml-auto', style: { display: 'flex', gap: '8px', alignItems: 'center' } },
            ce('span', { className: 'tag tag-blue' }, 'T46 · 2025'),
            ce('span', { style: { fontSize: '11px', color: 'var(--text2)' } }, 'Rev. D · Oct 2025')
          )
        ),
        ce(App, { selModel }),
        // Status bar
        ce('div', { className: 'statusbar' },
          ce('div', { className: 'status-dot' }),
          ce('span', null, 'Beretta Alfredo s.r.l. — Via Parini 24, 20842 Besana Brianza (MB) Italy'),
          ce('span', { style: { color: 'var(--text2)', marginLeft: 'auto', fontFamily: 'var(--font-mono)' } }, '🖼 Diagrams stored locally · 🔗 Click any row to link with drawing · ✏ Edit Hotspots to place markers')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(ce(Root));
  </script>
</body>

</html>
