<html lang="en">

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg0: #0d0f11;
      --bg1: #13171a;
      --bg2: #1a1f24;
      --bg3: #22282e;
      --bg4: #2c333b;
      --border: #2e3740;
      --border2: #3d4755;
      --text0: #e8edf2;
      --text1: #a8b4c0;
      --text2: #6b7a88;
      --amber: #f59e0b;
      --amber2: #d97706;
      --amber3: #92400e;
      --amberBg: #1c1408;
      --blue: #3b82f6;
      --blueBg: #0c1829;
      --green: #10b981;
      --greenBg: #041810;
      --red: #ef4444;
      --redBg: #180808;
      --font-ui: 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'Consolas', 'Courier New', monospace;
    }

    body {
      background: var(--bg0);
      color: var(--text0);
      font-family: var(--font-ui);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* TOP BAR */
    .topbar {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100
    }

    .logo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 8px
    }

    .logo-box {
      background: var(--amber);
      color: #000;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 1px;
      padding: 4px 9px;
      border-radius: 3px
    }

    .logo-sub {
      color: var(--text1);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border2);
      flex-shrink: 0
    }

    .topbar select,
    .topbar input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text0);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none
    }

    .topbar select:focus,
    .topbar input:focus {
      border-color: var(--amber)
    }

    .topbar input {
      width: 220px
    }

    .topbar input::placeholder {
      color: var(--text2)
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase
    }

    .tag-amber {
      background: var(--amberBg);
      color: var(--amber);
      border: 1px solid var(--amber3)
    }

    .tag-blue {
      background: var(--blueBg);
      color: var(--blue);
      border: 1px solid #1d4ed8
    }

    .badge-count {
      background: var(--amber);
      color: #000;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 800;
      margin-left: 4px
    }

    .ml-auto {
      margin-left: auto
    }

    .sn-label {
      color: var(--text2);
      font-size: 11px
    }

    .sn-value {
      color: var(--amber);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700
    }

    /* LAYOUT */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* LEFT SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0
    }

    .sidebar-header {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0
    }

    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase
    }

    .sidebar-scroll {
      overflow-y: auto;
      flex: 1
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px
    }

    .sidebar-scroll::-webkit-scrollbar-track {
      background: transparent
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    /* TREE ITEMS */
    .tree-item {
      display: flex;
      align-items: center;
      gap: 0;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s
    }

    .tree-item:hover {
      background: var(--bg3)
    }

    .tree-item.active {
      background: var(--amberBg);
      border-left-color: var(--amber)
    }

    .tree-item.active .tree-label {
      color: var(--amber)
    }

    .tree-item.active .tree-code {
      color: var(--amber2)
    }

    .tree-indent {
      flex-shrink: 0
    }

    .tree-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text2);
      font-size: 9px;
      transition: transform 0.15s
    }

    .tree-arrow.open {
      transform: rotate(90deg)
    }

    .tree-icon {
      font-size: 11px;
      flex-shrink: 0;
      width: 16px;
      text-align: center
    }

    .tree-content {
      padding: 5px 8px 5px 2px;
      flex: 1;
      min-width: 0
    }

    .tree-label {
      font-size: 12px;
      color: var(--text1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3
    }

    .tree-code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text2);
      margin-top: 1px
    }

    .tree-parts-badge {
      font-size: 10px;
      color: var(--text2);
      background: var(--bg4);
      border-radius: 8px;
      padding: 1px 5px;
      flex-shrink: 0;
      margin-right: 6px
    }

    /* MODEL GROUP */
    .model-group {
      border-bottom: 1px solid var(--border)
    }

    .model-header {
      padding: 7px 10px;
      background: var(--bg2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border-left: 3px solid var(--amber)
    }

    .model-header:hover {
      background: var(--bg3)
    }

    .model-name {
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--amber)
    }

    .model-desc {
      font-size: 10px;
      color: var(--text2);
      margin-left: auto
    }

    /* CONTENT AREA */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .content-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      flex-shrink: 0
    }

    .asm-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .asm-code-big {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--amber)
    }

    .asm-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text0)
    }

    .asm-meta {
      display: flex;
      gap: 16px;
      margin-top: 6px;
      flex-wrap: wrap
    }

    .asm-meta-item {
      font-size: 11px;
      color: var(--text2)
    }

    .asm-meta-item span {
      color: var(--text1)
    }

    /* TABLE */
    .table-wrap {
      flex: 1;
      overflow: auto
    }

    .table-wrap::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    .table-wrap::-webkit-scrollbar-track {
      background: transparent
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    .parts-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    .parts-table thead {
      position: sticky;
      top: 0;
      z-index: 10
    }

    .parts-table th {
      background: var(--bg2);
      color: var(--text2);
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border2);
      text-align: left;
      white-space: nowrap
    }

    .parts-table th.th-num {
      width: 48px;
      text-align: center
    }

    .parts-table th.th-qty {
      width: 52px;
      text-align: center
    }

    .parts-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle
    }

    .parts-table tr:hover td {
      background: var(--bg2)
    }

    .parts-table tr.highlighted td {
      background: var(--amberBg)
    }

    .cell-item {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text2);
      font-weight: 700
    }

    .cell-code {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--blue);
      word-break: break-all
    }

    .cell-desc-it {
      color: var(--text0);
      font-size: 12px
    }

    .cell-desc-en {
      color: var(--text2);
      font-size: 11px;
      font-style: italic;
      margin-top: 1px
    }

    .cell-qty {
      text-align: center;
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--text0)
    }

    .cell-partnum {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--amber)
    }

    .cell-partnum.special {
      color: var(--green)
    }

    .special-row td {
      border-left: 2px solid var(--green)
    }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text2)
    }

    .welcome-icon {
      font-size: 48px;
      opacity: 0.3
    }

    .welcome-title {
      font-size: 16px;
      color: var(--text1);
      font-weight: 600
    }

    .welcome-sub {
      font-size: 12px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6
    }

    .welcome-stats {
      display: flex;
      gap: 24px;
      margin-top: 8px
    }

    .stat-box {
      text-align: center;
      padding: 12px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--amber);
      font-family: var(--font-mono)
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px
    }

    /* STATUS BAR */
    .statusbar {
      background: var(--bg1);
      border-top: 1px solid var(--border);
      padding: 3px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 10px;
      color: var(--text2);
      flex-shrink: 0
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0
    }

    /* SEARCH HIGHLIGHT */
    mark {
      background: var(--amber3);
      color: var(--amber);
      border-radius: 2px;
      padding: 0 2px
    }

    /* SCROLLBAR GLOBAL */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }
  </style>
</head>

    function highlight(text, q) {
      if (!q || !text) return text;
      const idx = text.toLowerCase().indexOf(q.toLowerCase());
      if (idx < 0) return text;
      return React.createElement('span', null,
        text.slice(0, idx),
        React.createElement('mark', null, text.slice(idx, idx + q.length)),
        text.slice(idx + q.length)
      );
    }

    function App({ selModel }) {
      const [selAssembly, setSelAssembly] = useState(null);
      const [search, setSearch] = useState('');
      const [openGroups, setOpenGroups] = useState({});
      const [highlightRow, setHighlightRow] = useState(null);

      const model = useMemo(() => DB.models.find(m => m.id === selModel), [selModel]);

      const groupedAssemblies = useMemo(() => {
        const g = {};
        model.assemblies.forEach(a => {
          if (!g[a.group]) g[a.group] = [];
          g[a.group].push(a);
        });
        return g;
      }, [model]);

      const assembly = useMemo(() =>
        selAssembly ? model.assemblies.find(a => a.id === selAssembly) : null,
        [selAssembly, model]
      );

      const filteredParts = useMemo(() => {
        if (!assembly) return [];
        if (!search.trim()) return assembly.parts;
        const q = search.toLowerCase();
        return assembly.parts.filter(p =>
          (p.idCode || '').toLowerCase().includes(q) ||
          (p.descIT || '').toLowerCase().includes(q) ||
          (p.descEN || '').toLowerCase().includes(q) ||
          (p.pn || '').toLowerCase().includes(q) ||
          String(p.item).includes(q)

      }, [assembly, search]);

      const totalParts = useMemo(() => model.assemblies.reduce((s, a) => s + a.parts.length, 0), [model]);

        setOpenGroups(prev => ({ ...prev, [g]: !prev[g] }));

        setSearch('');
